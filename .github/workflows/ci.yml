name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache NLTK data
        uses: actions/cache@v4
        with:
          path: ~/nltk_data
          key: nltk-${{ runner.os }}-v1

      - name: Pre-download NLTK corpora
        run: |
          python -c "import nltk; [nltk.download(p, quiet=True) for p in ['punkt','punkt_tab','wordnet','omw-1.4','stopwords','averaged_perceptron_tagger','averaged_perceptron_tagger_eng']]"

      - name: Run pytest
        run: pytest -q
